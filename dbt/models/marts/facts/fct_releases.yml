version: 2

models:
  - name: fct_releases

    columns:

      - name: repository_key
        tests:
          - relationships:
              to: ref('dim_repository')
              field: repository_key

      - name: date_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: release_id
        tests:
          - unique
          - not_null